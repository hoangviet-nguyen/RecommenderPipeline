version: "3.8"
services:
  db:
    image: mysql/mysql-server
    container_name: mysql-anime
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: anime_db
    ports:
      - "3306:3306"
    volumes:
      - ./AnimeDB:/var/lib/mysql